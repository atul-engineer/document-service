events {}

http {
    # Define a group of backend servers (the upstream)
    upstream backend_servers {
        # List your application instances running on different localhost ports
        server host.docker.internal:8081;
        # server host.docker.internal:8081;
        # server host.docker.internal:8082;
    }

    server {
        listen 80; # NGINX listens on port 80 for incoming requests
        server_name localhost;

        location / {
            # Pass incoming requests to the 'backend_servers' group
            proxy_pass http://backend_servers;
        }
    }
}